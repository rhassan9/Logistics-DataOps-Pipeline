name: Logistics DataOps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: logistics_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: secretpassword
      DB_NAME: logistics_db

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ETL dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Prepare Sample Data for CI
      run: |
        mkdir -p data/raw data/processed
        cp -r data/samples/raw/* data/raw/

    - name: Install dbt
      run: |
        pip install dbt-postgres

    - name: Run Python ETL Pipeline
      run: |
        python main.py

    - name: Configure dbt profiles.yml
      run: |
        mkdir -p ~/.dbt
        cat <<EOF > ~/.dbt/profiles.yml
        dbt_logistics:
          target: dev
          outputs:
            dev:
              type: postgres
              host: localhost
              user: admin
              password: secretpassword
              port: 5432
              dbname: logistics_db
              schema: public
              threads: 4
        EOF

    - name: Run dbt Analytics Engineering Layer
      working-directory: ./dbt_logistics
      run: |
        dbt deps
        dbt build
